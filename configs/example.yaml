# Example site configuration for the multi-level directory scraper.
# This demonstrates the full config schema with all available options.

site:
  name: "Example Business Directory"
  base_url: "https://example-directory.com"
  output_dir: "./output"
  request_delay:
    min: 1.0
    max: 3.0
  max_pages: 500
  log_level: "info"

# Levels define the hierarchy of the directory site.
# The scraper traverses them in order (depth 0 -> 1 -> 2).
levels:
  # Level 0: Homepage / top-level directory
  # Extracts links to region pages
  - name: "regions"
    depth: 0
    link_selector: "a.region-link"
    context_selector: "h1.directory-title"
    renderer: "static"    # "static" uses httpx, "browser" uses Playwright
    fields:
      - name: "region_name"
        selector: "h2.region-title"

  # Level 1: Region listing pages
  # Extracts links to individual business detail pages
  # Supports pagination via "next page" links
  - name: "listings"
    depth: 1
    link_selector: "a.listing-link"
    context_selector: "h2.region-title"
    renderer: "browser"
    wait_selector: "div.listing-results"  # Wait for JS to render results
    pagination:
      type: "next_page"           # "next_page", "load_more", or "infinite_scroll"
      selector: "a.pagination-next"
      max_pages: 50               # Safety cap to prevent infinite loops
    fields:
      - name: "listing_name"
        selector: "h3.name"
      - name: "listing_url"
        selector: "a.listing-link"
        attribute: "href"

  # Level 2: Detail pages
  # Extracts structured data fields from each business page
  - name: "details"
    depth: 2
    link_selector: null           # Detail pages don't have child links
    renderer: "browser"
    wait_selector: "div.business-info"
    fields:
      # Multiple selectors per field: tried in order, first match wins
      - name: "business_name"
        selector: "h1.business-name"
      - name: "address"
        selector: "span.address, div.address-line"
      - name: "phone"
        selector: "a.phone-link, span.phone-number"
        attribute: "text"         # "text" (default) or an HTML attribute like "href"
      - name: "website"
        selector: "a.website-link"
        attribute: "href"         # Extract the href attribute instead of text
      - name: "rating"
        selector: "span.rating-value, div.star-rating"
      - name: "description"
        selector: "div.business-description, p.about-text"

# Retry configuration for resilient fetching
retry:
  rate_limit:
    max_attempts: 3
    min_wait: 5                   # Exponential backoff: 5s -> 10s -> 20s (capped at max_wait)
    max_wait: 60
  server_error:
    max_attempts: 2
    wait: 10                      # Fixed wait between retries

# Timeout configuration (seconds)
timeouts:
  navigation: 30                  # Page load timeout
  wait_selector: 15               # CSS selector wait timeout
  connect: 10                     # HTTP connection timeout
  read: 30                        # HTTP read timeout
